<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GIDF 2026 – Light Tech Pack</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0d1117;color:#c9d1d9;min-height:100vh}
.hdr{background:#161b22;border-bottom:2px solid #00b4d8;padding:20px 32px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.hdr-title{font-size:19px;font-weight:700;color:#fff;letter-spacing:.3px}
.hdr-sub{font-size:12px;color:#8b949e;margin-top:3px}
.badge{background:#00b4d8;color:#0d1117;font-size:10px;font-weight:700;padding:4px 11px;border-radius:20px;text-transform:uppercase;letter-spacing:1px}
.nav{background:#161b22;padding:0 32px;border-bottom:1px solid #21262d;display:flex;gap:2px;overflow-x:auto}
.nav-btn{background:none;border:none;color:#8b949e;padding:14px 18px;font-size:13px;font-weight:500;cursor:pointer;border-bottom:3px solid transparent;transition:all .18s;white-space:nowrap;font-family:inherit}
.nav-btn:hover{color:#c9d1d9;border-bottom-color:#30363d}
.nav-btn.active{color:#00b4d8;border-bottom-color:#00b4d8;font-weight:600}
.content{max-width:1180px;margin:0 auto;padding:28px 32px}
.sec-title{font-size:21px;font-weight:700;color:#fff;margin-bottom:6px}
.sec-sub{font-size:13px;color:#8b949e;margin-bottom:22px}
.table-wrap{background:#0d1117;border:1px solid #21262d;border-radius:10px;overflow:hidden;overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:#161b22;color:#8b949e;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;padding:10px 14px;text-align:left;border-bottom:1px solid #21262d;white-space:nowrap}
td{padding:11px 14px;border-bottom:1px solid #161b22;vertical-align:top}
tbody tr:last-child td{border-bottom:none}
tbody tr:hover td{background:rgba(255,255,255,.018)}
.num{font-size:17px;font-weight:700;min-width:32px;display:inline-block}
.chip{display:inline-block;font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px;margin:1px}
.chip-solo{background:rgba(168,85,247,.2);color:#c084fc}
.chip-group{background:rgba(0,180,216,.15);color:#67e8f9}
.chip-all{background:rgba(52,211,153,.15);color:#6ee7b7}
.chip-tbd{background:rgba(139,148,158,.12);color:#8b949e}
.pri-tag{display:inline-block;background:rgba(239,68,68,.22);color:#f87171;font-size:10px;font-weight:700;padding:2px 6px;border-radius:3px;margin-right:4px}
.legend{display:flex;flex-wrap:wrap;gap:10px;margin-bottom:18px;padding:14px 16px;background:#161b22;border:1px solid #21262d;border-radius:8px}
.li{display:flex;align-items:center;gap:5px;font-size:11px;color:#8b949e}
.ld{width:10px;height:10px;border-radius:2px;flex-shrink:0}
.info-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:14px;margin-bottom:24px}
.info-card{background:#161b22;border:1px solid #21262d;border-radius:9px;padding:18px}
.ic-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#8b949e;margin-bottom:6px}
.ic-val{font-size:22px;font-weight:700;color:#fff}
.ic-sub{font-size:12px;color:#484f58;margin-top:3px}
.tl{position:relative;padding-left:28px}
.tl::before{content:'';position:absolute;left:6px;top:0;bottom:0;width:2px;background:#21262d}
.tl-item{position:relative;margin-bottom:18px}
.tl-dot{position:absolute;left:-24px;top:4px;width:10px;height:10px;border-radius:50%;background:#00b4d8;border:2px solid #0d1117}
.tl-dot.pri{background:#ef4444;box-shadow:0 0 7px rgba(239,68,68,.4)}
.tl-dot.brk{background:#30363d}
.tl-dot.show{background:#ef4444;width:13px;height:13px;left:-26px;box-shadow:0 0 10px rgba(239,68,68,.5)}
.tl-time{font-size:12px;font-weight:700;color:#00b4d8;margin-bottom:2px}
.tl-lbl{font-size:14px;font-weight:600;color:#e6edf3}
.tl-note{font-size:11px;color:#484f58;margin-top:2px}
.alert{padding:12px 16px;border-radius:7px;margin-bottom:18px;font-size:13px;line-height:1.5}
.alert-warn{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.25);color:#fbbf24}
.alert-info{background:rgba(0,180,216,.08);border:1px solid rgba(0,180,216,.25);color:#67e8f9}

.import-section{max-width:700px}
.import-card{background:#161b22;border:1px solid #21262d;border-radius:10px;padding:22px 24px;margin-bottom:20px}
.import-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#8b949e;margin-bottom:8px;display:block}
.import-ta{width:100%;padding:10px 12px;background:#0d1117;border:1px solid #30363d;border-radius:7px;font-size:12px;font-family:monospace;color:#c9d1d9;min-height:80px;resize:vertical;box-sizing:border-box}
.import-ta:focus{outline:none;border-color:#00b4d8}
.import-btn{padding:10px 22px;background:#00b4d8;color:#0d1117;border:none;border-radius:7px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit;margin-top:10px}
.import-btn:hover{background:#0099b8}
.asts{width:100%;border-collapse:collapse;font-size:13px}
.asts th{background:#0d1117;color:#8b949e;padding:9px 12px;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.8px;border-bottom:1px solid #21262d}
.asts td{padding:10px 12px;border-bottom:1px solid #161b22;vertical-align:top}
.tag-ok{display:inline-block;background:rgba(52,211,153,.18);color:#6ee7b7;font-size:9px;font-weight:700;padding:2px 7px;border-radius:9px;text-transform:uppercase}
.tag-wait{display:inline-block;background:rgba(139,148,158,.12);color:#6e7681;font-size:9px;font-weight:700;padding:2px 7px;border-radius:9px;text-transform:uppercase}

@media(max-width:600px){
  .content{padding:16px 14px}
  .nav{padding:0 8px}
  .hdr{padding:14px 16px}
}

@media print {
  body { background:#fff !important; color:#000 !important; }
  .hdr { background:#fff !important; border-bottom:2px solid #000 !important; padding:12px 20px !important; }
  .hdr-title { color:#000 !important; font-size:14px !important; }
  .hdr-sub { color:#444 !important; font-size:11px !important; }
  .badge, .no-print { display:none !important; }
  #hdr-print-btn { display:none !important; }
  .nav { display:none !important; }
  .content { padding:8px 0 !important; max-width:100% !important; }
  .table-wrap { border:1px solid #ccc !important; border-radius:0 !important; overflow:visible !important; }
  table { font-size:10px !important; }
  th { background:#f0f0f0 !important; color:#000 !important; border-bottom:1px solid #ccc !important; padding:6px 8px !important; }
  td { border-bottom:1px solid #eee !important; color:#000 !important; padding:6px 8px !important; background:#fff !important; }
  .chip { border:1px solid #999 !important; background:#fff !important; color:#000 !important; }
  .pri-tag { background:#eee !important; color:#000 !important; }
  .alert { border:1px solid #999 !important; background:#f9f9f9 !important; color:#000 !important; }
  .so-tbl  { display:block !important; }
  .so-cards{ display:none  !important; }
  .import-section, .import-card, #notes-section { display:none !important; }
  @page { margin: 1cm; size: A4 landscape; }
}
</style>

const TC = {
  swapnil:  { bg:"rgba(244,162, 97,.07)", dot:"#f4a261", lbl:"Swapnil" },
  guest:    { bg:"rgba(168, 85,247,.07)", dot:"#a855f7", lbl:"Guest Teacher \u2605" },
  abc:      { bg:"rgba(  0,180,216,.07)", dot:"#00b4d8", lbl:"ABC Company" },
  bollyfolk:{ bg:"rgba( 52,211,153,.07)", dot:"#34d399", lbl:"Bollyfolk" },
  op:       { bg:"rgba( 99,102,241,.07)", dot:"#818cf8", lbl:"Opening Party Performer" },
  other:    { bg:"transparent",          dot:"#6e7681", lbl:"Other" }
};

function entryBadge(entry) {
  const isOff = entry && entry.toLowerCase().includes('off-stage');
  const isCurtain = entry && entry.toLowerCase().includes('curtain');
  if (isCurtain) return `<span style="display:inline-block;padding:3px 8px;border-radius:4px;font-size:11px;font-weight:700;background:#7c3aed;color:#fff;letter-spacing:.3px">CURTAIN</span>`;
  if (isOff)     return `<span style="display:inline-block;padding:3px 8px;border-radius:4px;font-size:11px;font-weight:700;background:#f4a261;color:#1a1a1a;letter-spacing:.3px">\u25b6 OFF-STAGE</span>`;
  return             `<span style="display:inline-block;padding:3px 8px;border-radius:4px;font-size:11px;font-weight:600;background:#21262d;color:#8b949e;letter-spacing:.3px">ON-STAGE</span>`;
}

function renderOrder() {
  const lgnd = Object.entries(TC).map(([k,v])=>`<div class="li"><div class="ld" style="background:${v.dot}"></div>${v.lbl}</div>`).join('')+
    `<div class="li"><span class="pri-tag">!</span>Priority cue</div>`;

  // TABLE rows — desktop
  const rows = ACTS.map(a=>{
    const c=TC[a.type]||TC.other;
    const pris=a.pri.map(p=>`<span class="pri-tag">!</span>${p}`).join(' ');
    const smk = a.smoke ? `<span style="display:inline-block;background:rgba(52,211,153,.18);color:#6ee7b7;font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px;margin-right:2px">SMOKE</span>` : '';
    const blk = a.blackout ? `<span style="display:inline-block;background:rgba(239,68,68,.18);color:#f87171;font-size:9px;font-weight:700;padding:1px 5px;border-radius:3px">BLACKOUT</span>` : '';
    return `<tr style="background:${c.bg}">
      <td><span class="num" style="color:${c.dot}">${a.num}</span></td>
      <td>
        <div style="font-weight:600;color:#e6edf3">${a.performer}${a.swapnil?' <span style="color:#f4a261;font-size:10px">\u25b6 SWAPNIL</span>':''}</div>
        ${pris?`<div style="margin-top:3px;font-size:11px;color:#f87171">${pris}</div>`:''}
      </td>
      <td style="color:#8b949e">${a.song||'\u2014'}</td>
      <td style="color:#8b949e;font-size:12px">${a.dur||'TBD'}</td>
      <td><span class="chip ${a.fmt==='Everyone'?'chip-all':a.fmt.includes('Solo')?'chip-solo':'chip-group'}">${a.fmt}</span></td>
      <td>${entryBadge(a.entry)}</td>
      <td>${a.photo && PHOTOS[a.photo] ? `<img src="data:image/jpeg;base64,${PHOTOS[a.photo][0]}" style="width:48px;height:48px;object-fit:cover;border-radius:4px;display:block;border:1px solid #30363d">` : '<span style="color:#30363d;font-size:11px">TBD</span>'}</td>
      <td>${smk}${blk}</td>
    </tr>`;
  }).join('');

  // CARD rows — mobile
  const cards = ACTS.map(a=>{
    const c=TC[a.type]||TC.other;
    const pris=a.pri.map(p=>`<span class="pri-tag">!</span>${p}`).join(' ');
    const fmtClass = a.fmt==='Everyone'?'chip-all':a.fmt.includes('Solo')?'chip-solo':'chip-group';
    const smk = a.smoke ? `<span style="display:inline-block;background:rgba(52,211,153,.18);color:#6ee7b7;font-size:9px;font-weight:700;padding:2px 6px;border-radius:3px;margin-right:3px">SMOKE</span>` : '';
    const blk = a.blackout ? `<span style="display:inline-block;background:rgba(239,68,68,.18);color:#f87171;font-size:9px;font-weight:700;padding:2px 6px;border-radius:3px">BLACKOUT</span>` : '';
    return `<div style="background:${c.bg};border:1px solid #30363d;border-radius:10px;margin-bottom:10px;overflow:hidden">
      <div style="display:flex;align-items:center;gap:12px;padding:11px 14px 9px;border-bottom:1px solid #21262d">
        <div style="min-width:30px;height:30px;border-radius:50%;background:${c.dot};display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;color:#0d1117;flex-shrink:0">${a.num}</div>
        <div style="flex:1;min-width:0">
          <div style="font-size:14px;font-weight:700;color:#e6edf3">${a.performer}${a.swapnil?' <span style="color:#f4a261;font-size:10px">\u25b6 SWAPNIL</span>':''}</div>
          <div style="margin-top:3px">${entryBadge(a.entry)}</div>
        </div>
        <span class="chip ${fmtClass}" style="flex-shrink:0">${a.fmt}</span>
      </div>
      <div style="padding:9px 14px 11px;display:flex;gap:10px;align-items:flex-start">
        ${a.photo && PHOTOS[a.photo] ? `<img src="data:image/jpeg;base64,${PHOTOS[a.photo][0]}" style="width:64px;height:64px;object-fit:cover;border-radius:6px;flex-shrink:0;border:1px solid #30363d">` : `<div style="width:64px;height:64px;border-radius:6px;background:#161b22;border:1px solid #21262d;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:10px;color:#484f58">TBD</div>`}
        <div style="display:flex;flex-direction:column;gap:5px;flex:1;min-width:0">
          <div style="display:flex;gap:6px;align-items:flex-start">
            <span style="font-size:10px;font-weight:700;color:#484f58;text-transform:uppercase;letter-spacing:.5px;min-width:36px;padding-top:1px;flex-shrink:0">Song</span>
            <span style="font-size:12px;color:#8b949e">${a.song||'TBD'}</span>
          </div>
          <div style="display:flex;gap:6px;align-items:flex-start">
            <span style="font-size:10px;font-weight:700;color:#484f58;text-transform:uppercase;letter-spacing:.5px;min-width:36px;padding-top:1px;flex-shrink:0">Dur</span>
            <span style="font-size:12px;color:#8b949e">${a.dur||'TBD'}</span>
          </div>
          ${(smk||blk) ? `<div style="margin-top:1px">${smk}${blk}</div>` : ''}
          ${pris ? `<div style="font-size:11px;color:#f87171">${pris}</div>` : ''}
        </div>
      </div>
    </div>`;
  }).join('');

  return `<style>
  .so-tbl  { display:block }
  .so-cards{ display:none  }
  @media(max-width:600px){ .so-tbl{ display:none } .so-cards{ display:block } }
</style>
<div class="sec-title">Show Order</div>

function importTeacherCode(code) {
  var resultEl = document.getElementById('import-result');
  if(!code || !code.trim()) {
    if(resultEl) resultEl.innerHTML = '<div style="color:#f87171;margin-top:10px">\u26a0 Please paste a code first.</div>';
    return;
  }
  try {
    var json = decodeURIComponent(escape(atob(code.trim())));
    var data = JSON.parse(json);
    var act = ACTS.find(function(a){ return a.num === data.actNum; });
    if(!act){
      if(resultEl) resultEl.innerHTML = '<div style="color:#f87171;margin-top:10px">\u2717 Act ' + data.actNum + ' not found in show order.</div>';
      return;
    }
    if(data.song)     act.song = data.song;
    if(data.duration) act.dur  = data.duration;
    if(data.lights)   act.lights = data.lights;
    if(data.lightCues) act.lights = (act.lights ? act.lights + '\n\u2014 Cue moments: ' + data.lightCues : 'Cue moments: ' + data.lightCues);
    if(typeof data.smoke    === 'boolean') act.smoke    = data.smoke;
    if(typeof data.blackout === 'boolean') act.blackout = data.blackout;
    if(data.cue === 'wing')    act.entry = 'Enter from wing after music begins';
    if(data.cue === 'onstage') act.entry = 'Already on stage when music starts';
    act._teacherConfirmed = true;
    act._teacherName = data.teacherName;
    // Update the status row in the DOM (no full re-render)
    var row = document.getElementById('irow-' + data.actNum);
    if(row) {
      row.cells[2].innerHTML = '<span class="tag-ok">\u2713 Received</span>';
      row.cells[3].innerHTML = '<span style="color:#e6edf3">' + (act.song || '\u2014') + '</span>';
      row.cells[4].innerHTML = '<span style="color:#8b949e">' + (act.dur || '\u2014') + '</span>';
      row.cells[5].innerHTML = '<span style="color:#8b949e;font-size:11px;white-space:pre">' + (act.lights || '\u2014') + '</span>';
    }
    if(resultEl) resultEl.innerHTML = '<div style="color:#34d399;margin-top:10px">\u2713 Act ' + data.actNum + ' (' + data.teacherName + ') imported. Song: <strong>' + (data.song||'?') + '</strong> \u00b7 Duration: <strong>' + (data.duration||'?') + '</strong></div>';
    // Clear the textarea
    var ta = document.getElementById('import-code-ta');
    if(ta) ta.value = '';
  } catch(e) {
    if(resultEl) resultEl.innerHTML = '<div style="color:#f87171;margin-top:10px">\u2717 Invalid code \u2014 please check and try again. (' + e.message + ')</div>';
  }
}

    + '<div class="table-wrap"><table class="asts">'
    + '<thead><tr><th>#</th><th>Performer</th><th>Status</th><th>Song</th><th>Duration</th><th>Lights</th></tr></thead>'
    + '<tbody>' + rows + '</tbody>'
    + '</table></div>'

    + '<div style="font-size:13px;font-weight:600;color:#f4a261;margin-bottom:6px">Import Tech Notes &mdash; from Light Technician</div>'

// ============================================================
// TECH NOTES — local save + share code system
// ============================================================
var _noteDebounce = null;

function notesLoad() {
  try { return JSON.parse(localStorage.getItem('gidf_tech_notes') || '{}'); } catch(e) { return {}; }
}
function notesSave(data) {
  localStorage.setItem('gidf_tech_notes', JSON.stringify(data));
}
function notesAutoSave() {
  clearTimeout(_noteDebounce);
  _noteDebounce = setTimeout(function(){
    var data = notesLoad();
    // Save per-act notes
    ACTS.forEach(function(a){
      var el = document.getElementById('actnote-'+a.num);
      if(el) data['act_'+a.num] = el.value;
    });
    // Save general sections
    var qEl = document.getElementById('notes-questions');
    var cEl = document.getElementById('notes-changes');
    if(qEl) data.questions = qEl.value;
    if(cEl) data.changes   = cEl.value;
    notesSave(data);
    var si = document.getElementById('notes-save-ind');
    if(si){ si.textContent = 'Saved \u2713'; si.style.color='#34d399'; setTimeout(function(){ si.textContent=''; }, 2000); }
  }, 600);
}
function notesGenerateCode() {
  var data = notesLoad();
  var saved = {};
  // Current textarea values
  ACTS.forEach(function(a){
    var el = document.getElementById('actnote-'+a.num);
    if(el && el.value.trim()) saved['act_'+a.num] = el.value.trim();
  });
  var qEl = document.getElementById('notes-questions');
  var cEl = document.getElementById('notes-changes');
  if(qEl && qEl.value.trim()) saved.questions = qEl.value.trim();
  if(cEl && cEl.value.trim()) saved.changes   = cEl.value.trim();
  saved.timestamp = new Date().toISOString().slice(0,16).replace('T',' ');
  saved.type = 'tech_notes';
  var code = btoa(unescape(encodeURIComponent(JSON.stringify(saved))));
  var outEl = document.getElementById('notes-code-out');
  if(outEl){ outEl.value = code; outEl.select(); try{ document.execCommand('copy'); }catch(e){} }
  var btn = document.getElementById('notes-gen-btn');
  if(btn){ btn.textContent = 'Code copied!'; setTimeout(function(){ btn.textContent = 'Generate & Copy Code'; }, 2500); }
}
function notesImportReply() {
  var ta = document.getElementById('notes-reply-ta');
  if(!ta || !ta.value.trim()) return;
  try {
    var json = decodeURIComponent(escape(atob(ta.value.trim())));
    var data = JSON.parse(json);
    if(data.type !== 'tech_reply') throw new Error('Not a reply code');
    // Show replies inline
    if(data.actReplies) {
      Object.keys(data.actReplies).forEach(function(k){
        var el = document.getElementById('reply-'+k);
        if(el){ el.style.display='block'; el.innerHTML = '<strong style="color:#f4a261">Swapnil:</strong> ' + data.actReplies[k]; }
      });
    }
    if(data.generalReply) {
      var gr = document.getElementById('notes-general-reply');
      if(gr){ gr.style.display='block'; gr.innerHTML = '<strong style="color:#f4a261">Swapnil:</strong> ' + data.generalReply; }
    }
    var rs = document.getElementById('notes-reply-status');
    if(rs) rs.innerHTML = '<span style="color:#34d399">\u2713 Reply loaded \u2014 ' + (data.timestamp||'') + '</span>';
    ta.value = '';
  } catch(e) {
    var rs = document.getElementById('notes-reply-status');
    if(rs) rs.innerHTML = '<span style="color:#f87171">\u2717 Invalid code \u2014 ' + e.message + '</span>';
  }
}

// For Swapnil's side: import tech notes and prepare a reply
function importTechNotes() {
  var ta = document.getElementById('import-tech-ta');
  var resEl = document.getElementById('import-tech-result');
  if(!ta || !ta.value.trim()) return;
  try {
    var json = decodeURIComponent(escape(atob(ta.value.trim())));
    var data = JSON.parse(json);
    if(data.type !== 'tech_notes') throw new Error('Not a tech notes code');
    window._techNotesData = data;
    var html = '<div style="background:#0d1117;border:1px solid #21262d;border-radius:8px;padding:18px;margin-top:14px">';
    html += '<div style="font-size:13px;font-weight:700;color:#e6edf3;margin-bottom:4px">Tech notes from ' + (data.timestamp||'unknown time') + '</div>';
    if(data.questions) html += '<div style="margin:10px 0"><div style="font-size:10px;font-weight:700;color:#8b949e;text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px">Questions</div><div style="font-size:13px;color:#c9d1d9;white-space:pre-wrap">' + data.questions + '</div></div>';
    if(data.changes)   html += '<div style="margin:10px 0"><div style="font-size:10px;font-weight:700;color:#8b949e;text-transform:uppercase;letter-spacing:.8px;margin-bottom:5px">Change Requests</div><div style="font-size:13px;color:#c9d1d9;white-space:pre-wrap">' + data.changes + '</div></div>';
    ACTS.forEach(function(a){
      var k = 'act_'+a.num;
      if(data[k]) html += '<div style="margin:8px 0;padding:8px 12px;background:#161b22;border-radius:6px"><span style="font-weight:700;color:#f4a261">Act '+a.num+' \u2014 '+a.performer+':</span> <span style="color:#c9d1d9">'+data[k]+'</span></div>';
    });
    html += '<div style="margin-top:14px"><div style="font-size:11px;font-weight:700;color:#8b949e;text-transform:uppercase;letter-spacing:.8px;margin-bottom:6px">Your reply (optional)</div>';
    html += '<textarea id="swapnil-reply-ta" style="width:100%;background:#0d1117;border:1px solid #30363d;border-radius:6px;padding:8px;color:#c9d1d9;font-size:12px;resize:vertical;min-height:70px;font-family:inherit" placeholder="Type a general reply or notes back to the tech..."></textarea>';
    html += '<br><button onclick="generateTechReply()" style="margin-top:8px;padding:8px 18px;background:#f4a261;color:#0d1117;border:none;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit">Generate Reply Code</button></div>';
    html += '<textarea id="swapnil-reply-code" style="width:100%;margin-top:10px;background:#0d1117;border:1px solid #30363d;border-radius:6px;padding:8px;color:#34d399;font-size:11px;font-family:monospace;min-height:60px;resize:vertical;display:none" readonly></textarea>';
    html += '</div>';
    if(resEl) resEl.innerHTML = html;
    ta.value = '';
  } catch(e) {
    if(resEl) resEl.innerHTML = '<div style="color:#f87171;margin-top:10px">\u2717 Invalid tech notes code \u2014 ' + e.message + '</div>';
  }
}
function generateTechReply() {
  var replyTa = document.getElementById('swapnil-reply-ta');
  var d = window._techNotesData || {};
  var reply = { type:'tech_reply', timestamp: new Date().toISOString().slice(0,16).replace('T',' ') };
  if(replyTa && replyTa.value.trim()) reply.generalReply = replyTa.value.trim();
  var code = btoa(unescape(encodeURIComponent(JSON.stringify(reply))));
  var codeEl = document.getElementById('swapnil-reply-code');
  if(codeEl){ codeEl.style.display='block'; codeEl.value=code; codeEl.select(); try{ document.execCommand('copy'); }catch(e){} }
}

    + '<!-- QUESTIONS -->'
    + '<div style="background:#161b22;border:1px solid #21262d;border-radius:8px;padding:16px;margin-top:16px;margin-bottom:12px">'
    + '<div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#8b949e;margin-bottom:7px">Questions for Swapnil</div>'
    + '<textarea id="notes-questions" oninput="notesAutoSave()" style="width:100%;background:#0d1117;border:1px solid #30363d;border-radius:6px;padding:10px;color:#c9d1d9;font-size:13px;resize:vertical;min-height:80px;font-family:inherit;box-sizing:border-box" placeholder="General questions about the show, timing, transitions\u2026">'+(saved.questions||'')+'</textarea>'
    + '<div id="notes-general-reply" style="display:none;margin-top:8px;padding:8px 12px;background:rgba(244,162,97,.08);border-left:3px solid #f4a261;border-radius:0 6px 6px 0;font-size:12px;color:#c9d1d9"></div>'
    + '</div>'

    + '<!-- CHANGE REQUESTS -->'
    + '<div style="background:#161b22;border:1px solid #21262d;border-radius:8px;padding:16px;margin-bottom:20px">'
    + '<div style="font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:#8b949e;margin-bottom:7px">Change Requests</div>'
    + '<textarea id="notes-changes" oninput="notesAutoSave()" style="width:100%;background:#0d1117;border:1px solid #30363d;border-radius:6px;padding:10px;color:#c9d1d9;font-size:13px;resize:vertical;min-height:80px;font-family:inherit;box-sizing:border-box" placeholder="Requests to update or correct anything in the pack\u2026">'+(saved.changes||'')+'</textarea>'
    + '</div>'

    + '<!-- GENERATE CODE -->'
    + '<div style="background:#161b22;border:1px solid #21262d;border-radius:8px;padding:18px;margin-bottom:20px">'
    + '<div style="font-size:13px;font-weight:700;color:#e6edf3;margin-bottom:4px">Share with Swapnil</div>'
    + '<div style="font-size:12px;color:#484f58;margin-bottom:12px">Generate a code and send it via WhatsApp, email or any messenger.</div>'
    + '<button id="notes-gen-btn" onclick="notesGenerateCode()" style="padding:10px 22px;background:#00b4d8;color:#0d1117;border:none;border-radius:7px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit">Generate &amp; Copy Code</button>'
    + '<textarea id="notes-code-out" style="display:block;width:100%;margin-top:10px;background:#0d1117;border:1px solid #30363d;border-radius:6px;padding:8px;color:#00b4d8;font-size:11px;font-family:monospace;min-height:60px;resize:vertical;box-sizing:border-box" readonly></textarea>'
    + '</div>'

    + '<!-- IMPORT REPLY -->'
    + '<div style="background:#161b22;border:1px solid #21262d;border-radius:8px;padding:18px">'
    + '<div style="font-size:13px;font-weight:700;color:#e6edf3;margin-bottom:4px">Import Reply from Swapnil</div>'
    + '<div style="font-size:12px;color:#484f58;margin-bottom:10px">Paste the reply code Swapnil sent back.</div>'
    + '<textarea id="notes-reply-ta" style="width:100%;background:#0d1117;border:1px solid #30363d;border-radius:6px;padding:10px;color:#c9d1d9;font-size:12px;font-family:monospace;min-height:60px;resize:vertical;box-sizing:border-box" placeholder="Paste reply code here\u2026"></textarea>'
    + '<br><button onclick="notesImportReply()" style="margin-top:8px;padding:10px 22px;background:#21262d;color:#c9d1d9;border:1px solid #30363d;border-radius:7px;font-size:13px;font-weight:700;cursor:pointer;font-family:inherit">Load Reply</button>'
    + '<div id="notes-reply-status" style="margin-top:8px;font-size:12px"></div>'
    + '</div>'

    + '</div>';
}

function show(btn,name){
  document.querySelectorAll('.nav-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  const el=document.getElementById('content');
  if(name==='order') el.innerHTML=renderOrder();
  if(name==='cheat') el.innerHTML=renderCheat();
  if(name==='reh')   el.innerHTML=renderRehearsal();
  if(name==='script')el.innerHTML=renderScript();
  if(name==='import')el.innerHTML=renderImport();
  if(name==='notes') el.innerHTML=renderNotes();
}
document.getElementById('content').innerHTML=renderOrder();
</script>
</body>
</html>
